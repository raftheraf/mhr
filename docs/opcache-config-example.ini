; =============================================================================
; OPcache - Configurazione consigliata per My Handy Restaurant (XAMPP)
; Copia le righe necessarie in php.ini (sezione [opcache]) o in un file .ini
; incluso da php.ini con directiva=value (senza [opcache] nel file incluso).
; =============================================================================

[opcache]

; --- Abilitazione ---
; Abilita OPcache per il SAPI web (Apache)
opcache.enable=1

; Disabilita OPcache per CLI: in sviluppo gli script php da terminale
; vedono subito le modifiche; il web usa la cache.
opcache.enable_cli=0

; --- Memoria ---
; Memoria condivisa per il bytecode (MB). Per mhr ~64–128 MB sono sufficienti.
; Se hai molti moduli/estensioni, usa 128.
opcache.memory_consumption=128

; Memoria per stringhe internalizzate (MB). Riduce uso RAM per stringhe ripetute.
opcache.interned_strings_buffer=8

; Numero massimo di script in cache. Il progetto ha centinaia di file PHP;
; 5000–10000 è adatto. Non esagerare: ogni slot consuma memoria.
opcache.max_accelerated_files=10000

; Percentuale di memoria "sprecata" oltre cui OPcache pianifica un restart.
; 5 è un buon compromesso.
opcache.max_wasted_percentage=5

; --- Chiave di cache e aggiornamento file ---
; 1 = usa working directory nella chiave (evita collisioni tra file omonimi).
; Consigliato 1 in sviluppo e su progetti con path diversi per stesso nome file.
opcache.use_cwd=1

; SVILUPPO: 1 = controlla data modifica file (vedi subito le modifiche).
; PRODUZIONE: 0 = massime prestazioni, riavvia Apache o chiama opcache_reset
; dopo ogni deploy.
opcache.validate_timestamps=1

; Se validate_timestamps=1, ogni quanti secondi controllare (0 = ogni richiesta).
; Sviluppo: 0 o 1. Produzione (se tieni validate_timestamps=1): 60–300.
opcache.revalidate_freq=2

; Cerca anche in include_path quando si risolve un path. Di solito 0.
opcache.revalidate_path=0

; --- Commenti e documentazione ---
; Mantieni 1 se usi Reflection, annotazioni, Doctrine, ecc.
opcache.save_comments=1
opcache.load_comments=1

; --- Prestazioni ---
; Shutdown rapido (consigliato 1; in PHP 8 può essere ignorato/deprecato).
opcache.fast_shutdown=1

; Usa la cache per file_exists() e simili. 1 = piccolo guadagno, di solito sicuro.
opcache.enable_file_override=0

; Livello di ottimizzazione (tutte le passate = default).
opcache.optimization_level=0xffffffff

; --- File da escludere / dimensioni ---
; File di blacklist (un path per riga). Lascia vuoto se non serve.
; opcache.blacklist_filename=

; Dimensione massima file da cachare (bytes). 0 = nessun limite.
opcache.max_file_size=0

; --- Restart e timeout ---
; Controllo checksum ogni N richieste (0 = disabilitato, migliore per prod).
opcache.consistency_checks=0

; Secondi di attesa prima di forzare restart dopo uno scheduled restart.
opcache.force_restart_timeout=180

; --- Log ---
; File di log OPcache. Vuoto = stderr.
; opcache.error_log=

; Livello verbosità: 1=errori, 2=warning, 3=info, 4=debug.
opcache.log_verbosity_level=1

; --- Memoria e sicurezza ---
; Modello di memoria preferito. Vuoto = scelta del sistema.
; opcache.preferred_memory_model=

; 1 = proteggi SHM da scritture (solo debug). Produzione: 0.
opcache.protect_memory=0

; Validazione permessi file in cache (es. chroot). Di solito 0.
; opcache.validate_permission=0

; Previene collisioni in chroot. 0 se non usi chroot.
; opcache.validate_root=0

; =============================================================================
; NOTE:
; - opcache.inherited_hack e opcache.dups_fix sono deprecati/rimossi in PHP 7+
;   non impostarli.
; - Dopo aver modificato php.ini riavvia Apache.
; - In produzione, con validate_timestamps=0, dopo ogni deploy esegui
;   opcache_reset (es. php opcache.php da CLI o script protetto in admin).
; =============================================================================
